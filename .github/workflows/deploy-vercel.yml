# Deploy production on Vercel from GitHub (explicit branch + commit).
#
# Secrets required:
#   VERCEL_TOKEN        — https://vercel.com/account/tokens
#   VERCEL_PROJECT_ID   — Vercel → diazitesai → Settings → General → Project ID
#
# Vercel must have GitHub connected: Settings → Git → diazitesai-dotcom/Diazites
#
# Do NOT re-run old workflow runs — use Run workflow on latest commit.

name: Deploy to Vercel

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::Missing VERCEL_TOKEN"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "::error::Missing VERCEL_PROJECT_ID"
            exit 1
          fi

      - name: Resolve Vercel account/team
        id: scope
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: node scripts/resolve-vercel-scope.mjs

      - name: Deploy production from GitHub
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ steps.scope.outputs.org_id }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: node scripts/trigger-vercel-git-deploy.mjs

      - name: Summary
        run: |
          echo "### Vercel production deploy started" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Git ref:** \`${{ github.ref_name }}\` @ \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Deployment:** ${{ steps.deploy.outputs.deployment_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Open Vercel → **Deployments** — new build should appear in ~30s." >> "$GITHUB_STEP_SUMMARY"
