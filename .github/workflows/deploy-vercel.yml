# Deploy to Vercel on push to master/main.
#
# OPTION A — Deploy Hook (simplest, add one secret):
#   Vercel → Project → Settings → Git → Deploy Hooks → Create (branch: master)
#   GitHub secret: VERCEL_DEPLOY_HOOK = hook URL
#
# OPTION B — CLI (if no hook or hook fails):
#   VERCEL_TOKEN  — https://vercel.com/account/tokens
#   VERCEL_PROJECT_ID — project Settings → General (prj_…)
#   ORG_ID is auto-discovered (VERCEL_ORG_ID secret is optional/ignored)

name: Deploy to Vercel

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via Vercel hook (if configured)
        id: hook
        continue-on-error: true
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "No VERCEL_DEPLOY_HOOK — will use CLI."
            exit 1
          fi
          echo "Triggering deploy hook…"
          curl -fsS -X POST "$HOOK"
          echo "Hook accepted. See Vercel → Deployments."

      - name: Checkout
        if: steps.hook.outcome != 'success'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.hook.outcome != 'success'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        if: steps.hook.outcome != 'success'
        run: npm ci

      - name: Install Vercel CLI
        if: steps.hook.outcome != 'success'
        run: npm install -g vercel@latest

      - name: Validate CLI secrets
        if: steps.hook.outcome != 'success'
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::Set VERCEL_TOKEN or VERCEL_DEPLOY_HOOK"
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "::error::Set VERCEL_PROJECT_ID (prj_… from Vercel project settings)"
            exit 1
          fi

      - name: Resolve Vercel scope (auto)
        id: scope
        if: steps.hook.outcome != 'success'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: node scripts/resolve-vercel-scope.mjs

      - name: Link project
        if: steps.hook.outcome != 'success'
        run: |
          mkdir -p .vercel
          node -e "
            const fs = require('fs');
            fs.writeFileSync('.vercel/project.json', JSON.stringify({
              orgId: process.env.ORG_ID,
              projectId: process.env.PROJECT_ID
            }));
          "
        env:
          ORG_ID: ${{ steps.scope.outputs.org_id }}
          PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy via CLI
        id: cli
        if: steps.hook.outcome != 'success'
        env:
          VERCEL_ORG_ID: ${{ steps.scope.outputs.org_id }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          ARGS=(deploy --prod --yes --token="${{ secrets.VERCEL_TOKEN }}")
          SLUG="${{ steps.scope.outputs.team_slug }}"
          if [ -n "$SLUG" ]; then
            ARGS+=(--scope "$SLUG")
          fi
          url=$(vercel "${ARGS[@]}")
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed: $url"

      - name: Summary
        if: always()
        run: |
          echo "### Vercel deploy" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.hook.outcome }}" = "success" ]; then
            echo "- **Method:** Deploy hook" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- **Method:** CLI (${{ steps.scope.outputs.scope_mode }})" >> "$GITHUB_STEP_SUMMARY"
            echo "- **URL:** ${{ steps.cli.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- **Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
