# Triggers a Vercel production deploy via Deploy Hook (no CLI, no ORG_ID).
#
# Setup:
#   1. Vercel → diazitesai project → Settings → Git → Deploy Hooks
#   2. Create hook for branch **master** (or main — must match your default branch)
#   3. GitHub → Settings → Secrets → VERCEL_DEPLOY_HOOK = full hook URL
#
# IMPORTANT: Do NOT "Re-run" old failed jobs — they use old workflow files.
#            Use Actions → Deploy to Vercel → Run workflow (pick branch master).

name: Deploy to Vercel

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel production deploy
        run: |
          HOOK="${{ secrets.VERCEL_DEPLOY_HOOK }}"
          if [ -z "$HOOK" ]; then
            echo "::error::Missing VERCEL_DEPLOY_HOOK."
            echo "::error::Vercel → Settings → Git → Deploy Hooks → Copy URL → GitHub secret VERCEL_DEPLOY_HOOK"
            exit 1
          fi
          echo "POST $HOOK"
          HTTP=$(curl -sS -o /tmp/vercel-hook.json -w "%{http_code}" -X POST "$HOOK")
          echo "HTTP $HTTP"
          cat /tmp/vercel-hook.json || true
          if [ "$HTTP" -lt 200 ] || [ "$HTTP" -ge 300 ]; then
            echo "::error::Deploy hook failed (HTTP $HTTP). Re-copy the full URL from Vercel."
            exit 1
          fi
          echo "Deploy started. Open Vercel → Deployments and wait ~2–3 min."

      - name: Summary
        run: |
          echo "### Vercel deploy triggered" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Method:** Deploy hook" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Check [Vercel Deployments](https://vercel.com) for build status." >> "$GITHUB_STEP_SUMMARY"
